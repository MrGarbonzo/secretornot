services:
  secretornot:
    image: ghcr.io/mrgarbonzo/secretornot@sha256:16bb58358a4cbc39210bb4a9b8294e921c6bd49901296f3ec3af3dac21f957d0
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_AI_ENDPOINT=${SECRET_AI_ENDPOINT}
      - SECRET_AI_API_KEY=${SECRET_AI_API_KEY}
      - PUBLIC_LLM_ENDPOINT=${PUBLIC_LLM_ENDPOINT}
      - PUBLIC_LLM_API_KEY=${PUBLIC_LLM_API_KEY}
      - CLASSIFIER_BACKEND=distilbert
      - DISTILBERT_MODEL_PATH=training/model.onnx
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.85}
      - CLASSIFICATION_TIMEOUT_MS=${CLASSIFICATION_TIMEOUT_MS:-2000}
      - PROXY_TIMEOUT_S=${PROXY_TIMEOUT_S:-120}
      - AUDIT_LOG_FILE=${AUDIT_LOG_FILE:-audit.jsonl}
